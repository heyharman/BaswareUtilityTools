name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build DLL
        run: |
          cl /LD src\main.cpp /FeBaswareUtilityTools.dll user32.lib

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BaswareUtilityTools
          path: BaswareUtilityTools.dll
