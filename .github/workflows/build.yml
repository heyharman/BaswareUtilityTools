name: Build Basware Utility Tools

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show repository files
        shell: pwsh
        run: |
          Write-Host "Current folder:"
          Get-Location
          Write-Host "Repository files:"
          Get-ChildItem -Recurse

      - name: Build x64 DLL using Visual Studio Build Tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found. Visual Studio Build Tools are not available on this runner."
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio C++ build tools not found."
          }

          Write-Host "Visual Studio path: $vsPath"

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

          if (!(Test-Path $vcvars)) {
            throw "vcvars64.bat not found."
          }

          if (!(Test-Path "src\main.cpp")) {
            throw "src\main.cpp not found. Please confirm the file exists in the repo."
          }

          cmd /c "`"$vcvars`" && cl /nologo /EHsc /LD /DUNICODE /D_UNICODE src\main.cpp user32.lib /link /OUT:BaswareUtilityTools.dll"

          if (!(Test-Path "BaswareUtilityTools.dll")) {
            throw "DLL was not created."
          }

      - name: Prepare plugin package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package\BaswareUtilityTools
          Copy-Item BaswareUtilityTools.dll package\BaswareUtilityTools\BaswareUtilityTools.dll

          Compress-Archive -Path package\BaswareUtilityTools -DestinationPath BaswareUtilityTools-x64.zip -Force

          Write-Host "Package created:"
          Get-ChildItem

      - name: Upload DLL package
        uses: actions/upload-artifact@v4
        with:
          name: BaswareUtilityTools-x64
          path: BaswareUtilityTools-x64.zip
