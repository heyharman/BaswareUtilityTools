name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Check files
        shell: cmd
        run: |
          dir
          dir src

      - name: Build DLL
        shell: cmd
        run: |
          cl /nologo /LD src\main.cpp user32.lib /link /OUT:BaswareUtilityTools.dll

      - name: Show output files
        shell: cmd
        run: |
          dir

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BaswareUtilityTools
          path: BaswareUtilityTools.dll
