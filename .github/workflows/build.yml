name: Build Basware Utility Tools

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show files
        shell: pwsh
        run: |
          Write-Host "Current location:"
          Get-Location
          Write-Host "Repository files:"
          Get-ChildItem -Recurse

      - name: Build DLL
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio C++ Build Tools not found"
          }

          Write-Host "Visual Studio found at: $vsPath"

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

          if (!(Test-Path $vcvars)) {
            throw "vcvars64.bat not found"
          }

          if (!(Test-Path "src\main.cpp")) {
            throw "src\main.cpp not found"
          }

          $cmd = "call ""$vcvars"" && cl /nologo /EHsc /LD /DUNICODE /D_UNICODE src\main.cpp user32.lib /link /OUT:BaswareUtilityTools.dll"

          Write-Host "Running compile command:"
          Write-Host $cmd

          cmd.exe /c $cmd

          if ($LASTEXITCODE -ne 0) {
            throw "Compilation failed with exit code $LASTEXITCODE"
          }

          if (!(Test-Path "BaswareUtilityTools.dll")) {
            throw "BaswareUtilityTools.dll was not created"
          }

      - name: Create plugin ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package\BaswareUtilityTools
          Copy-Item BaswareUtilityTools.dll package\BaswareUtilityTools\BaswareUtilityTools.dll
          Compress-Archive -Path package\BaswareUtilityTools -DestinationPath BaswareUtilityTools-x64.zip -Force
          Get-ChildItem

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: BaswareUtilityTools-x64
          path: BaswareUtilityTools-x64.zip
